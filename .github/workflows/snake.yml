name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23ea580c&color_dots=%23ebedf0,%23ffedd5,%23fdba74,%23f97316,%23c2410c
            dist/github-contribution-grid-snake-dark.svg?color_snake=%23fb923c&color_dots=%23161b22,%233a1f0a,%237c2d12,%23c2410c,%23fb923c

      - name: Strip progress bar
        run: sed -i -E 's|<rect class="u u[^"]*"[^/]*/>||g' dist/*.svg

      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
